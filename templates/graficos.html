<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gráficos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/style.css') }}"
    />
    <link
      rel="icon"
      href="{{ url_for('static', filename='img/unnamed.png') }}"
    />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/graficos.css') }}"
    />
  </head>
  <body>
    <header>
      <div class="logo">
        <div class="logo-icon">
          <img
            src="{{ url_for('static', filename='img/unnamed.png') }}"
            alt="Logo"
          />
        </div>
        <a href="{{ url_for('index') }}">
          <span class="logo-text"
            >Dolar Actual
            <small style="font-size: 0.6rem; color: var(--text-gray)"
              >VE</small
            ></span
          >
        </a>
      </div>
      <nav id="nav-menu">
        <a href="{{ url_for('index') }}">Inicio</a>
        <a href="{{ url_for('contacto') }}">Contacto</a>
        <a href="{{ url_for('graficos') }}">Gráficos</a>
      </nav>
      <button class="hamburger" id="hamburger-btn" aria-label="Abrir menú">
        <span class="bar"></span>
        <span class="bar"></span>
        <span class="bar"></span>
      </button>
    </header>

    <main class="graficos-main">
      <div class="chart-header">
        <h2>Historial de 7 Días</h2>
        <p>Evolución de las tasas en la base de datos.</p>
      </div>

      <div class="charts-grid">
        <!-- Tarjeta Dólar -->
        <div class="glass-card">
          <div class="card-title">
            <span class="icon">💵</span>
            <h3>Dólar BCV</h3>
          </div>
          <div class="canvas-wrapper">
            <canvas id="dolarChart"></canvas>
          </div>
        </div>

        <!-- Tarjeta Euro -->
        <div class="glass-card">
          <div class="card-title">
            <span class="icon">💶</span>
            <h3>Euro BCV</h3>
          </div>
          <div class="canvas-wrapper">
            <canvas id="euroChart"></canvas>
          </div>
        </div>

        <!-- Tarjeta USDT -->
        <div class="glass-card">
          <div class="card-title">
            <span class="icon">₮</span>
            <h3>USDT Paralelo</h3>
          </div>
          <div class="canvas-wrapper">
            <canvas id="usdtChart"></canvas>
          </div>
        </div>
      </div>

      <div class="back-btn-container">
        <a href="{{ url_for('index') }}" class="back-btn">Volver al Inicio</a>
      </div>
    </main>
    <footer>
      <p>© 2026 DolarActualVE. Inc</p>
    </footer>

    <script>
      const historyData = {{ history | tojson }};
    </script>
    <script src="{{ url_for('static', filename='js/graficos.js') }}"></script>
    <script src="{{ url_for('static', filename='js/menu.js') }}"></script>
  </body>
</html>
